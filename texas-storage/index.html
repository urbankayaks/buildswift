<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Texas Statewide Storage Index</title>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <style>
    body{font-family:Arial,sans-serif;background:#0b0f14;color:#e6edf3;margin:0;padding:20px}
    .row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px}
    input,select,button{padding:8px;border-radius:6px;border:1px solid #2f3b47;background:#111821;color:#e6edf3}
    table{width:100%;border-collapse:collapse;margin-top:10px}
    th,td{border:1px solid #2f3b47;padding:6px;text-align:left;font-size:12px;vertical-align:top}
    th{background:#111821}
    .card{background:#10161f;border:1px solid #2f3b47;padding:12px;border-radius:10px;margin-top:10px}
    #map{height:560px;width:100%}
  </style>
</head>
<body>
  <h2>Texas Storage Opportunity Index — Statewide</h2>
  <div class="card">
    <h3>Dataset Snapshot</h3>
    <div id="snapshot">Loading…</div>
  </div>
  <div class="card"><h3>County Map</h3><div id="map"></div></div>

  <div class="card">
    <h3>Counties</h3>
    <div class="row"><input id="county" placeholder="Filter county" /><button onclick="renderCounties()">Filter</button></div>
    <table><thead><tr><th>County</th><th>Score</th><th>Contractors</th><th>HOAs</th><th>Parcels</th></tr></thead><tbody id="counties"></tbody></table>
  </div>

  <div class="card">
    <h3>Target Property Candidates (for contractor storage)</h3>
    <div class="row"><input id="targetCounty" placeholder="Filter county" /><button onclick="renderTargets()">Filter</button></div>
    <table><thead><tr><th>Score</th><th>Parcel</th><th>County</th><th>City</th><th>Zip</th><th>Lot SF</th><th>Bldg SF</th><th>Class</th><th>Owner</th></tr></thead><tbody id="targets"></tbody></table>
  </div>

  <div class="card">
    <h3>Searchable Index</h3>
    <div class="row">
      <input id="q" placeholder="Search" />
      <select id="t"><option value="">all</option><option>county</option><option>hoa</option><option>contractor</option><option>parcel</option></select>
      <input id="c" placeholder="County" />
      <button onclick="runSearch()">Search</button>
    </div>
    <table><thead><tr><th>Type</th><th>County</th><th>City</th><th>Name</th><th>Details</th></tr></thead><tbody id="results"></tbody></table>
  </div>

<script>
let counties=[]; let records=[]; let targets=[]; let metadata={};
async function init(){
  [counties,records,targets,metadata]=await Promise.all([
    fetch('./data/counties.json').then(r=>r.json()),
    fetch('./data/records.json').then(r=>r.json()),
    fetch('./data/targets.json').then(r=>r.json()),
    fetch('./data/metadata.json').then(r=>r.json())
  ]);
  renderSnapshot();
  renderCounties();
  renderTargets();
  runSearch();
  drawMap();
}

function renderSnapshot(){
  const el=document.getElementById('snapshot');
  const ts=(metadata.generated_at_utc||'').replace('T',' ').replace('+00:00',' UTC');
  el.innerHTML=`Updated: <b>${ts}</b><br>Counties: <b>${metadata.county_count||0}</b> · Records: <b>${metadata.record_count||0}</b> · Targets: <b>${metadata.target_count||0}</b>`;
}

function renderCounties(){
  const f=(document.getElementById('county').value||'').toUpperCase();
  const rows=counties.filter(x=>!f||x.county.includes(f));
  const el=document.getElementById('counties');
  el.innerHTML='';
  rows.slice(0,254).forEach(r=>el.innerHTML += `<tr><td>${r.county}</td><td>${r.score}</td><td>${r.contractor_count}</td><td>${r.hoa_count}</td><td>${r.parcel_count}</td></tr>`);
}

function renderTargets(){
  const c=(document.getElementById('targetCounty').value||'').toUpperCase();
  const rows=targets.filter(r=>!c || (r.county||'').toUpperCase().includes(c)).slice(0,300);
  const el=document.getElementById('targets');
  el.innerHTML='';
  rows.forEach(r=>el.innerHTML += `<tr><td>${r.target_score||''}</td><td>${r.parcel_id||''}</td><td>${r.county||''}</td><td>${r.city||''}</td><td>${r.zip||''}</td><td>${r.lot_size||''}</td><td>${r.bldg_area||''}</td><td>${r.class_desc||''}</td><td>${r.owner_name||''}</td></tr>`);
}

function runSearch(){
  const q=(document.getElementById('q').value||'').toLowerCase();
  const t=(document.getElementById('t').value||'').toLowerCase();
  const c=(document.getElementById('c').value||'').toUpperCase();
  const rows=records.filter(r=>{
    if(t && r.record_type!==t) return false;
    if(c && r.county!==c) return false;
    if(!q) return true;
    return `${r.name||''} ${r.details||''} ${r.county||''} ${r.city||''}`.toLowerCase().includes(q);
  }).slice(0,200);
  const el=document.getElementById('results');
  el.innerHTML='';
  rows.forEach(r=>el.innerHTML += `<tr><td>${r.record_type}</td><td>${r.county||''}</td><td>${r.city||''}</td><td>${r.name||''}</td><td>${(r.details||'').slice(0,160)}</td></tr>`);
}

async function drawMap(){
  const geo=await fetch('https://raw.githubusercontent.com/Cincome/tx.geojson/master/counties/tx_counties.geojson').then(r=>r.json());
  const by=Object.fromEntries(counties.map(r=>[r.county,r]));
  const locations=[],z=[],text=[];
  for(const f of geo.features){
    const countyLabel=String(f.properties.COUNTY||'');
    const u=countyLabel.toUpperCase().replace(/ COUNTY$/,'').trim();
    const r=by[u]||{score:0,contractor_count:0,hoa_count:0,parcel_count:0};
    locations.push(countyLabel); z.push(r.score||0);
    text.push(`${u}<br>Score:${r.score||0}<br>Contractors:${r.contractor_count||0}<br>HOAs:${r.hoa_count||0}<br>Parcels:${r.parcel_count||0}`);
  }
  Plotly.newPlot('map',[{type:'choroplethmapbox',geojson:geo,locations,z,featureidkey:'properties.COUNTY',text,hovertemplate:'%{text}<extra></extra>',colorscale:'YlOrRd'}],{mapbox:{style:'carto-darkmatter',center:{lat:31,lon:-99.3},zoom:4.8},margin:{l:0,r:0,t:0,b:0},paper_bgcolor:'#10161f',font:{color:'#e6edf3'}});
}

init();
</script>
</body>
</html>
